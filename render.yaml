services:
  - type: web
    name: splitpay-store
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SPLITPAY_API_URL
        sync: false
      - key: NEXT_PUBLIC_SPLITPAY_API_URL
        sync: false
